---

- name: Install MariaDB (Ubuntu)
  tags: db
  apt:
    name: mariadb-server
    state: latest
    update_cache: yes
  when: ansible_distribution == "Ubuntu"

- name: Install MariaDB (CentOS)
  tags: db
  dnf:
    name: mariadb-server
    state: latest
  when: ansible_distribution == "CentOS"

- name: Start MariaDB service
  tags: db
  service:
    name: mariadb
    state: started
    enabled: true