---
  - hosts: all
    become: true
    pre_tasks:


     - name: Install Updates (CentOS)
       tags: always
       dnf:
        update_only: yes
        update_cache: yes
       when: ansible_distribution == "CentOS"

     - name: Install Updates (Ubuntu)
       tags: always
       apt:
        upgrade: yes
        update_cache: yes
       when: ansible_distribution == "Ubuntu"

  - hosts: web_servers
    tags: apache,apache2,ubuntu
    become: true
    tasks:

     - name: Install Apache and PHP for Ubuntu Servers
       apt:
        name:
          - apache2
          - libapache2-mod-php
        state: latest
        update_cache: yes
       when: ansible_distribution == "Ubuntu"

     - name: Install Apache and PHP for CentOS Servers
       tags: apache,centos,httpd
       dnf:
         name:
            - httpd
            - php
         state: latest
       when: ansible_distribution == "CentOS"

     - name: Start httpd (CentOS)
       tags: apache, centos, httpd
       service:
         name: httpd
         stage: started
       when: ansible_distribution == "CentOS"

  - hosts: db_servers
    become: true
    tasks:

      - name: Install Mariadb Package(CentOS)
        tags: centos, db,mariadb
        yum:
          name: mariadb-server
          state: latest
        when: ansible_distribution == "CentOS"

      - name: "Mariadb- Restarting/Enabling"
        service:
          name: mariadb
          state: restarted
          enabled: true


      - name: Install Mariadb Package(Ubuntu)
        tags: db, mariadb, ubuntu
        apt:
          name: mariadb-server
          state: latest
        when: ansible_distribution == "Ubuntu"      
      
      - name: "Mariadb- Restarting/Enabling"
        service:
          name: mariadb
          state: restarted
          enabled: true

  - hosts: file_servers
    become: true
    tasks:

      - name: Install samba package
        tags: samba
        package:
          name: samba
          state: latest